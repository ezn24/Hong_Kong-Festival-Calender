name: Update calendar

on:
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * *"

permissions:
  contents: write

concurrency:
  group: update-calendar
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Generate merged calendar
        run: python src/merge_calendar.py

      - name: Commit updated calendar
        run: |
          if [ -z "$(git status --porcelain -- hong-kong-calendar.ics)" ]; then
            echo "Calendar is unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hong-kong-calendar.ics
          git commit -m "Update Hong Kong calendar"
          git push
